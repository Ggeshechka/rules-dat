name: Build RU Production Rules

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build geosite.dat
        run: |
          git clone https://github.com/v2fly/domain-list-community.git dlc
          cd dlc
          go run ./ --exportlists=ru,category-ads-all,private
          mv dlc.dat ../geosite.dat
          cd ..

      - name: Build geoip.dat
        run: |
          # Устанавливаем проверенную утилиту v2dat
          go install github.com/urunsayan/v2dat@latest
          
          # Скачиваем полную базу
          wget https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat -O full_geoip.dat
          
          # Извлекаем только нужные теги (RU и Private)
          $(go env GOPATH)/bin/v2dat unpack geoip -o ./geoip_out -f ru -f private full_geoip.dat
          
          # Запаковываем обратно в маленький файл
          $(go env GOPATH)/bin/v2dat pack geoip -o . ./geoip_out
          mv geoip.dat geoip.dat

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: RU Production Rules
          files: |
            geosite.dat
            geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
