name: Build RU Production Rules

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build geosite.dat (RU + Private + Ads)
        run: |
          git clone https://github.com/v2fly/domain-list-community.git dlc
          cd dlc
          go run ./ --exportlists=ru,category-ads-all,private
          mv dlc.dat ../geosite.dat
          cd ..

      - name: Build geoip.dat (RU + Private)
        run: |
          git clone https://github.com/v2fly/geoip.git gip
          cd gip
          # Генерируем только нужные списки
          go run ./ --list=ru,private
          mv geoip.dat ../geoip.dat
          cd ..

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: RU Production Rules
          files: |
            geosite.dat
            geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
