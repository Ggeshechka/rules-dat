name: Build RU Production Rules

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build geosite.dat
        run: |
          git clone https://github.com/v2fly/domain-list-community.git dlc
          cd dlc
          go run ./ --exportlists=ru,category-ads-all,private
          mv dlc.dat ../geosite.dat
          cd ..

      - name: Build geoip.dat
        run: |
          # Скачиваем бинарник v2dat напрямую (версия v0.0.2)
          curl -L https://github.com/urunsayan/v2dat/releases/download/v0.0.2/v2dat_0.0.2_linux_amd64.tar.gz -o v2dat.tar.gz
          tar -xzf v2dat.tar.gz
          chmod +x v2dat
          
          # Скачиваем базу
          wget https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat -O full_geoip.dat
          
          # Нарезка и сборка
          ./v2dat unpack geoip -o ./geoip_out -f ru -f private full_geoip.dat
          ./v2dat pack geoip -o . ./geoip_out
          # Файл уже называется geoip.dat по умолчанию после pack

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: RU Production Rules
          files: |
            geosite.dat
            geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
