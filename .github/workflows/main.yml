name: Build RU Rules

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Build geosite.dat (RU + Private + Ads)
        run: |
          git clone https://github.com/v2fly/domain-list-community.git
          cd domain-list-community
          go run ./ --exportlists=ru,category-ads-all,private
          mv dlc.dat ../geosite.dat
          cd ..

      - name: Build geoip.dat (RU + Private)
        run: |
          go install github.com/snet-sjtu/v2dat@latest
          wget https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat -O full_geoip.dat
          ~/go/bin/v2dat unpack geoip -o ./geoip_custom -f "ru,private" full_geoip.dat
          ~/go/bin/v2dat pack geoip -o . ./geoip_custom

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: RU Rules
          files: |
            geosite.dat
            geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
