name: Build RU Rules

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Build geosite.dat (RU + Private + Ads)
        run: |
          git clone https://github.com/v2fly/domain-list-community.git
          cd domain-list-community
          go run ./ --exportlists=ru,category-ads-all,private
          mv dlc.dat ../geosite.dat
          cd ..

      - name: Build geoip.dat (RU + Private)
        run: |
          git clone https://github.com/v2fly/geoip.git
          cd geoip
          wget https://github.com/v2fly/geoip/raw/master/config.json
          go run ./ --format=v2ray --list=ru,private
          mv geoip.dat ../geoip.dat
          cd ..

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: RU Rules
          files: |
            geosite.dat
            geoip.dat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
