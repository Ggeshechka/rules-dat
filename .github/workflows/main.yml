name: Build Lite RU Rules

on:
  push: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Checkout v2fly/domain-list-community
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: community

      - name: Prepare Data Directory
        run: |
          mkdir -p publish
          mkdir -p custom_data
          # Используем подпапку data/ из склонированной репозитории
          cp community/data/ru custom_data/
          cp community/data/private custom_data/
          cp community/data/category-ads-all custom_data/

      - name: Build geosite.dat
        run: |
          cd community
          # Собираем базу, указывая путь к нашим отфильтрованным файлам
          go run ./ --datapath=../custom_data
          mv dlc.dat ../publish/geosite.dat
          cd ..

      - name: Build geoip.dat
        run: |
          # Скачиваем утилиту для нарезки IP
          curl -L https://github.com/urunsayan/v2dat/releases/download/v0.0.2/v2dat_0.0.2_linux_amd64.tar.gz -o v2dat.tar.gz
          tar -xzf v2dat.tar.gz
          chmod +x v2dat
          
          # Берем свежую полную базу от Loyalsoldier
          wget https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat -O full_geoip.dat
          
          # Оставляем только RU и локальные сети
          ./v2dat unpack geoip -o ./geoip_out -f ru -f private full_geoip.dat
          ./v2dat pack geoip -o ./publish ./geoip_out

      - name: Generate SHA256
        run: |
          cd publish
          sha256sum geosite.dat > geosite.dat.sha256sum
          sha256sum geoip.dat > geoip.dat.sha256sum

      - name: Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "RU Lite Rules $(date +%Y%m%d)"
          files: ./publish/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
